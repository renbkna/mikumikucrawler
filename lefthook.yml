pre-commit:
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: ./node_modules/.bin/biome format --write --files-ignore-unknown=true --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: ./node_modules/.bin/oxlint --config .oxlintrc.json --deny-warnings {staged_files}

pre-push:
  commands:
    check:
      run: bun run check
