<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'self';
    script-src 'self' __VITE_SCRIPT_SOURCE__;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https://*.vercel.app;
    connect-src 'self' __VITE_BACKEND_CONNECT_SOURCE__;
    upgrade-insecure-requests;"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Title and Description -->
    <title>Miku Miku Crawler | Cute & Fast Web Crawling</title>
    <meta
      name="description"
      content="Miku Miku Crawler is a cute, modern web crawler. Watch pages being crawled with live statistics and Miku-themed animations!"
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="Miku Miku Crawler, Web Crawler, React, Vite, Web Scraping, Hatsune Miku, Cute"
    />

    <!-- SEO Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="renbkna" />

    <!-- Color Scheme and Appearance -->
    <meta name="theme-color" content="#39c5bb" />
    <meta name="color-scheme" content="light" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/miku.ico" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect & DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload Critical Assets -->
    <link rel="preload" href="/miku1.gif" as="image" />

    <!-- Font Loading -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=JetBrains+Mono:wght@400;700&family=Varela+Round&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Inline Critical CSS -->
    <style>
      :root {
        --miku-teal: #69c9e5;
        --miku-pink: #e98ab7;
        --miku-lavender: #a2a4eb;
        --miku-bg: #f6f8fd;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--miku-bg);
        font-family: 'Varela Round', sans-serif;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--miku-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background-image: radial-gradient(circle at 50% 35%, rgba(172, 213, 245, 0.3), transparent 35%);
      }

      .miku-loader {
        width: 100px;
        height: 100px;
        position: relative;
        margin-bottom: 20px;
        animation: bounce 2s infinite ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .miku-loader img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        animation: spin 3s infinite linear;
        background: transparent;
      }

      .miku-loader::after {
        content: '';
        position: absolute;
        inset: 0;
        border: 2px solid rgba(105, 201, 229, 0.35);
        border-top-color: var(--miku-pink);
        border-radius: 50%;
        animation: spin 1.5s infinite linear;
      }

      .loading-screen h1 {
        color: var(--miku-lavender);
        font-size: 24px;
        margin-bottom: 8px;
        text-shadow: none;
      }

      .loading-screen p {
        color: var(--miku-pink);
        font-weight: bold;
        font-size: 14px;
        letter-spacing: 1px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <div class="loading-screen" id="loading-screen">
      <div class="miku-loader">
        <img src="/miku.ico" alt="Miku" />
      </div>
      <h1>Miku Miku Crawler</h1>
      <p>LOADING...</p>
    </div>

    <div id="root"></div>

    <script src="/loading-fallback.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
